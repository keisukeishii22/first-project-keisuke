name: 週次コンテンツ自動生成

on:
  schedule:
    - cron: '0 0 * * 0'  # 毎週日曜 09:00 JST (UTC 00:00)
  workflow_dispatch:       # 手動実行ボタンも用意

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: anthropic SDK インストール
        run: pip install anthropic

      - name: 週次コンテンツ生成
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/generate_weekly_content.py
          echo "week=$(cat .week_number)" >> "$GITHUB_OUTPUT"

      - name: コミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -f .week_number
          git add -A
          if git diff --cached --quiet; then
            echo "変更なし(全週生成済み or スキップ)"
          else
            git commit -m "週次コンテンツ自動生成: 第${{ steps.generate.outputs.week }}週 ($(date +%Y-%m-%d))"
            git push
          fi
