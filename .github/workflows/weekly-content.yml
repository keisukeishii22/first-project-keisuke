name: 週次コンテンツ自動生成

# 定期実行(cron)は 2026-07-02 に停止。
# 週次生成は Web 検索でファクトチェックできる Claude Code スケジュールセッションに移行
# (設定手順: 自動運用ルーティーン.md「起動方法」)。
# このワークフローは緊急時の手動フォールバックとして残す(Web検索なし・参考情報源は発行元列挙のみ)。
on:
  workflow_dispatch:       # 手動実行のみ

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存ライブラリのインストール
        run: pip install anthropic

      - name: 週次コンテンツ生成
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/generate_weekly_content.py
          echo "week=$(cat .week_number)" >> "$GITHUB_OUTPUT"

      - name: コミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "変更なし(全週生成済み or スキップ)"
          else
            git commit -m "週次コンテンツ自動生成: 第${{ steps.generate.outputs.week }}週 ($(date +%Y-%m-%d))"
            git push
          fi

